<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Chuyển đổi & Nhân Rcon</title>
</head>
<body class="bg-slate-900 text-white p-6 md:p-10 font-sans">
    <div class="max-w-4xl mx-auto">
        <a href="index.html" class="text-blue-400 hover:underline">← Quay lại trang chủ</a>
        <h1 class="text-3xl font-bold my-6 text-emerald-400">Chuyển đổi & Nhân Rcon (GF 2⁸)</h1>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                <h2 class="text-xl font-bold mb-4 text-blue-400">🔄 Chuyển đổi hệ số</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase font-bold">Thập phân (Dec)</label>
                        <input id="dec" type="number" oninput="convert('dec')" class="w-full bg-slate-700 p-3 rounded mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase font-bold">Lục thập phân (Hex)</label>
                        <input id="hex" type="text" oninput="convert('hex')" class="w-full bg-slate-700 p-3 rounded mt-1 focus:ring-2 focus:ring-blue-500 outline-none uppercase">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase font-bold">Nhị phân (Bin)</label>
                        <input id="bin" type="text" oninput="convert('bin')" class="w-full bg-slate-700 p-3 rounded mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
            </div>

            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                <h2 class="text-xl font-bold mb-4 text-emerald-400">⚡ Quá trình nhân Rcon</h2>
                <div class="space-y-4">
                    <label class="text-xs text-slate-400 italic leading-snug">
                        Nhập số vòng (Round) để xem các bước dịch bit (x) và XOR đa thức bất khả quy (0x11B) dưới dạng nhị phân.
                    </label>
                    <div class="flex gap-2">
                        <input id="roundNum" type="number" min="1" max="10" value="1" class="flex-1 bg-slate-700 p-3 rounded outline-none border border-slate-600">
                        <button onclick="stepRcon()" class="bg-emerald-600 px-6 py-3 rounded font-bold hover:bg-emerald-500 transition">TÍNH TOÁN</button>
                    </div>

                    <div id="stepArea" class="mt-4 p-4 bg-black rounded border border-emerald-900/50 min-h-[150px] overflow-x-auto">
                        <div id="resDetail" class="font-mono text-[13px] leading-relaxed text-slate-300">
                            Kết quả nhân chi tiết sẽ hiện ở đây...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Hàm chuyển sang nhị phân 8-bit hoặc hơn
        const toBin = (n, bits = 8) => n.toString(2).padStart(bits, '0');
        const toHex = (n) => n.toString(16).toUpperCase().padStart(2, '0');

        function convert(type) {
            const d = document.getElementById('dec'), h = document.getElementById('hex'), b = document.getElementById('bin');
            let val;
            if (type === 'dec') val = parseInt(d.value, 10);
            if (type === 'hex') val = parseInt(h.value, 16);
            if (type === 'bin') val = parseInt(b.value, 2);

            if (!isNaN(val)) {
                if (type !== 'dec') d.value = val;
                if (type !== 'hex') h.value = val.toString(16).toUpperCase();
                if (type !== 'bin') b.value = val.toString(2);
            }
        }

        function stepRcon() {
            const round = parseInt(document.getElementById('roundNum').value);
            const detailArea = document.getElementById('resDetail');
            let rc = 1;
            let html = `<div class="text-blue-400 mb-2 font-bold underline">Vòng 1:</div>`;
            html += `Giá trị: 01 (Hex) | <span class="text-yellow-500">${toBin(1)}</span> (Bin)<br><br>`;

            for (let i = 2; i <= round; i++) {
                html += `<div class="text-blue-400 mb-1 font-bold underline">Vòng ${i}:</div>`;
                let prev = rc;
                rc = rc << 1; // Nhân x (dịch trái)
                
                html += `B1: Dịch trái: ${toBin(prev)} << 1 = <span class="text-emerald-400">${toBin(rc, 9)}</span><br>`;

                if (rc & 0x100) { // Có bit tràn ở vị trí thứ 9
                    html += `B2: Bit thứ 9 là 1 (Tràn) -> XOR với 100011011 (0x11B):<br>`;
                    html += `&nbsp;&nbsp;&nbsp; ${toBin(rc, 9)}<br>`;
                    html += `XOR 100011011<br>`;
                    rc ^= 0x11B;
                    html += `-----------------<br>`;
                    html += `KẾT QUẢ: <span class="text-yellow-500">${toBin(rc, 8)}</span> (Hex: ${toHex(rc)})<br><br>`;
                } else {
                    html += `B2: Không tràn -> Giữ nguyên.<br>`;
                    html += `KẾT QUẢ: <span class="text-yellow-500">${toBin(rc, 8)}</span> (Hex: ${toHex(rc)})<br><br>`;
                }
            }
            
            const final = toHex(rc);
            html += `<hr class="border-slate-800 my-2">`;
            html += `<div class="text-center font-bold text-emerald-400 text-lg">Rcon[${round}] = [${final}, 00, 00, 00]</div>`;
            detailArea.innerHTML = html;
        }
    </script>
</body>
</html>
