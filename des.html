<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>DES Step-by-Step Solver - Kido</title>
    <style>
        .hex-font { font-family: 'ui-monospace', SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .section-header { background: #1e293b; color: white; padding: 10px 15px; font-weight: 800; border-radius: 4px; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .round-container { border: 2px solid #e2e8f0; border-radius: 8px; margin-top: 20px; overflow: hidden; }
        .round-header { background: #ef4444; color: white; padding: 8px 15px; font-weight: 900; text-align: center; }
        .step-item { padding: 10px 15px; border-bottom: 1px solid #f1f5f9; }
        .step-label { color: #b91c1c; font-weight: 700; display: block; margin-bottom: 2px; font-size: 0.8rem; }
        .final-result { background: #059669; color: white; padding: 20px; border-radius: 12px; margin-top: 30px; text-align: center; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 p-4 md:p-8 font-sans">
    <div class="max-w-4xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-200">
        <div class="bg-red-700 p-6 text-white">
            <h1 class="text-2xl font-black italic">DES STEP-BY-STEP SOLVER</h1>
            <p class="text-xs opacity-80 uppercase tracking-widest">Trình giải chi tiết 16 vòng lặp - Designed for Kido</p>
        </div>

        <div class="p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-100 p-5 rounded-xl border border-slate-200">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-1">Khóa K (64-bit Hex)</label>
                    <input id="keyK" class="w-full p-3 border-2 border-slate-300 rounded-lg hex-font focus:border-red-500 outline-none" placeholder="VD: 3FF81CDA5F417784">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-1">Bản tin M (64-bit Hex)</label>
                    <input id="textM" class="w-full p-3 border-2 border-slate-300 rounded-lg hex-font focus:border-red-500 outline-none" placeholder="VD: FF1C9CA3596B7D48">
                </div>
                <button onclick="solveDES()" class="md:col-span-2 bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-lg transition-transform active:scale-95 uppercase text-sm">
                    Bắt đầu giải chi tiết theo yêu cầu
                </button>
            </div>

            <div id="outputArea" class="hidden">
                <div id="solverContent" class="hex-font text-sm leading-relaxed text-slate-700"></div>
            </div>

            <div id="placeholder" class="text-center py-20 text-slate-400 italic">
                Vui lòng nhập K và M để hệ thống xuất lời giải...
            </div>
        </div>
    </div>

    <script>
        // Các bảng hằng số (giữ nguyên chuẩn DES)
        const PC1 = [57,49,41,33,25,17,9,1,58,50,42,34,26,18,10,2,59,51,43,35,27,19,11,3,60,52,44,36,63,55,47,39,31,23,15,7,62,54,46,38,30,22,14,6,61,53,45,37,29,21,13,5,28,20,12,4];
        const PC2 = [14,17,11,24,1,5,3,28,15,6,21,10,23,19,12,4,26,8,16,7,27,20,13,2,41,52,31,37,47,55,30,40,51,45,33,48,44,49,39,56,34,53,46,42,50,36,29,32];
        const IP = [58,50,42,34,26,18,10,2,60,52,44,36,28,20,12,4,62,54,46,38,30,22,14,6,64,56,48,40,32,24,16,8,57,49,41,33,25,17,9,1,59,51,43,35,27,19,11,3,61,53,45,37,29,21,13,5,63,55,47,39,31,23,15,7];
        const E = [32,1,2,3,4,5,4,5,6,7,8,9,8,9,10,11,12,13,12,13,14,15,16,17,16,17,18,19,20,21,20,21,22,23,24,25,24,25,26,27,28,29,28,29,30,31,32,1];
        const P = [16,7,20,21,29,12,28,17,1,15,23,26,5,18,31,10,2,8,24,14,32,27,3,9,19,13,30,6,22,11,4,25];
        const IP_INV = [40,8,48,16,56,24,64,32,39,7,47,15,55,23,63,31,38,6,46,14,54,22,62,30,37,5,45,13,53,21,61,29,36,4,44,12,52,20,60,28,35,3,43,11,51,19,59,27,34,2,42,10,50,18,58,26,33,1,41,9,49,17,57,25];
        const SHIFTS = [1,1,2,2,2,2,2,2,1,2,2,2,2,2,2,1];
        const S_BOXES = [
            [[14,4,13,1,2,15,11,8,3,10,6,12,5,9,0,7],[0,15,7,4,14,2,13,1,10,6,12,11,9,5,3,8],[4,1,14,8,13,6,2,11,15,12,9,7,3,10,5,0],[15,12,8,2,4,9,1,7,5,11,3,14,10,0,6,13]],
            [[15,1,8,14,6,11,3,4,9,7,2,13,12,0,5,10],[3,13,4,7,15,2,8,14,12,0,1,10,6,9,11,5],[0,14,7,11,10,4,13,1,5,8,12,6,9,3,2,15],[13,8,10,1,3,15,4,2,11,6,7,12,0,5,14,9]],
            [[10,0,9,14,6,3,15,5,1,13,12,7,11,4,2,8],[13,7,0,9,3,4,6,10,2,8,5,14,12,11,15,1],[13,6,4,9,8,15,3,0,11,1,2,12,5,10,14,7],[1,10,13,0,6,9,8,7,4,15,14,3,11,5,2,12]],
            [[7,13,14,3,0,6,9,10,1,2,8,5,11,12,4,15],[13,8,11,5,6,15,0,3,4,7,2,12,1,10,14,9],[10,6,9,0,12,11,7,13,15,1,3,14,5,2,8,4],[3,15,0,6,10,1,13,8,9,4,5,11,12,7,2,14]],
            [[2,12,4,1,7,10,11,6,8,5,3,15,13,0,14,9],[14,11,2,12,4,7,13,1,5,0,15,10,3,9,8,6],[4,2,1,11,10,13,7,8,15,9,12,5,6,3,0,14],[11,8,12,7,1,14,2,13,6,15,0,9,10,4,5,3]],
            [[12,1,10,15,9,2,6,8,0,13,3,4,14,7,5,11],[10,15,4,2,7,12,9,5,6,1,13,14,0,11,3,8],[9,14,15,5,2,8,12,3,7,0,4,10,1,13,11,6],[4,3,2,12,9,5,15,10,11,14,1,7,6,0,8,13]],
            [[4,11,2,14,15,0,8,13,3,12,9,7,5,10,6,1],[13,0,11,7,4,9,1,10,14,3,5,12,2,15,8,6],[1,4,11,13,12,3,7,14,10,15,6,8,0,5,9,2],[6,11,13,8,1,4,10,7,9,5,0,15,14,2,3,12]],
            [[13,2,8,4,6,15,11,1,10,9,3,14,5,0,12,7],[1,15,13,8,10,3,7,4,12,5,6,11,0,14,9,2],[7,11,4,1,9,12,14,2,0,6,10,13,15,3,5,8],[2,1,14,7,4,10,8,13,15,12,9,0,3,5,6,11]]
        ];

        const hex2bin = (h) => h.split('').map(c => parseInt(c,16).toString(2).padStart(4,'0')).join('');
        const bin2hex = (b) => {
            let res = "";
            for(let i=0; i<b.length; i+=4) res += parseInt(b.substr(i,4),2).toString(16).toUpperCase();
            return res;
        };
        const permute = (inp, tbl) => tbl.map(p => inp[p-1]).join('');
        const xor = (a, b) => a.split('').map((bit, i) => bit === b[i] ? '0' : '1').join('');

        function solveDES() {
            const K_hex = document.getElementById('keyK').value.trim();
            const M_hex = document.getElementById('textM').value.trim();
            if(!K_hex || !M_hex) return alert("Nhập K và M đi Việt ơi!");

            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('outputArea').classList.remove('hidden');

            const K_bin = hex2bin(K_hex);
            const M_bin = hex2bin(M_hex);
            let out = "";

            // --- PHẦN 1: SINH KHÓA ---
            out += `<div class="section-header">PHẦN 1: SINH KHÓA Ki TỪ KHÓA K</div>`;
            const pc1 = permute(K_bin, PC1);
            let C = pc1.substr(0, 28);
            let D = pc1.substr(28, 28);
            out += `<div class="p-4 border-b">
                        <span class="step-label">1. Tính hoán vị PC1:</span>
                        Input: K = ${K_hex}<br>Output: C0 = ${bin2hex(C)}, D0 = ${bin2hex(D)}
                    </div>`;

            let keys = [];
            let currentC = C, currentD = D;

            for(let i=0; i<16; i++) {
                let s = SHIFTS[i];
                currentC = currentC.substr(s) + currentC.substr(0, s);
                currentD = currentD.substr(s) + currentD.substr(0, s);
                let Ki = permute(currentC + currentD, PC2);
                keys.push(Ki);

                if(i === 0) { // In chi tiết bước 2, 3 cho vòng 1
                    out += `<div class="p-4 border-b">
                                <span class="step-label">2. Tính dịch vòng C1, D1 (s1=1):</span>
                                Output: C1 = ${bin2hex(currentC)}, D1 = ${bin2hex(currentD)}
                            </div>`;
                    out += `<div class="p-4 border-b text-red-600 font-bold">
                                <span class="step-label">3. Tính khóa K1 (PC2):</span>
                                Output: K1 = ${bin2hex(Ki)}
                            </div>`;
                }
            }

            // --- PHẦN 2: MÃ HÓA ---
            out += `<div class="section-header">PHẦN 2: MÃ HÓA</div>`;
            const ip = permute(M_bin, IP);
            let L = ip.substr(0, 32);
            let R = ip.substr(32, 32);
            out += `<div class="p-4 border-b">
                        <span class="step-label">4. Tính hoán vị IP đối với M:</span>
                        Input: M = ${M_hex}<br>Output: L0 = ${bin2hex(L)}, R0 = ${bin2hex(R)}
                    </div>`;

            // CHẠY 16 VÒNG
            for(let i=0; i<16; i++) {
                let prevL = L;
                let prevR = R;
                
                // Mở rộng E
                let ER = permute(prevR, E);
                // XOR với Ki
                let A = xor(ER, keys[i]);
                // S-box
                let B = "";
                for(let j=0; j<8; j++) {
                    let chunk = A.substr(j*6, 6);
                    let row = parseInt(chunk[0] + chunk[5], 2);
                    let col = parseInt(chunk.substr(1, 4), 2);
                    B += S_BOXES[j][row][col].toString(2).padStart(4, '0');
                }
                // P
                let F = permute(B, P);
                
                // Kết quả vòng
                L = prevR;
                R = xor(prevL, F);

                // HIỂN THỊ CHI TIẾT
                out += `<div class="round-container">
                    <div class="round-header italic">========== CHI TIẾT VÒNG LẶP THỨ ${i+1} ==========</div>
                    <div class="step-item"><span class="step-label">5. Hàm mở rộng E[R${i}]:</span>Output: ER${i} = ${bin2hex(ER)}</div>
                    <div class="step-item"><span class="step-label">6. XOR ER${i} với K${i+1}:</span>Output: A = ${bin2hex(A)}</div>
                    <div class="step-item"><span class="step-label">7. Phép thế S-box:</span>Output: B = ${bin2hex(B)}</div>
                    <div class="step-item"><span class="step-label">8. Hoán vị P đối với B:</span>Output: F = ${bin2hex(F)}</div>
                    <div class="bg-blue-50 p-3"><span class="step-label text-blue-700 uppercase">========= THỰC HIỆN VÒNG LẶP THỨ ${i+1} =========</span>
                        <span class="font-bold">9. Kết quả Vòng ${i+1}:</span><br>Output: L${i+1} = ${bin2hex(L)}; R${i+1} = ${bin2hex(R)}
                    </div>
                </div>`;
            }

            // --- KẾT THÚC ---
            const preOutput = R + L; // R16L16
            const FinalC = permute(preOutput, IP_INV);
            out += `<div class="section-header">PHẦN 3: KẾT THÚC</div>`;
            out += `<div class="p-4 border-b">
                        <span class="step-label italic uppercase">========= KẾT THÚC VÒNG LẶP THỨ 16 =========</span>
                        <span class="step-label">11. Hoán vị cuối cùng IP-1:</span>
                        Input: L16 = ${bin2hex(L)}, R16 = ${bin2hex(R)} (R16L16 hoán vị)<br>
                        Output: C = ${bin2hex(FinalC)}
                    </div>`;

            out += `<div class="final-result">
                        <div class="text-xs uppercase font-black opacity-80 mb-1">============ KẾT QUẢ MÃ HÓA ============</div>
                        <div class="text-3xl font-bold tracking-tighter">${bin2hex(FinalC)}</div>
                    </div>`;

            document.getElementById('solverContent').innerHTML = out;
            document.getElementById('outputArea').scrollIntoView();
        }
    </script>
</body>
</html>
