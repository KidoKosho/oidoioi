<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>DES Step-by-Step Solver - Kido Fixed</title>
    <style>
        .hex-font { font-family: 'ui-monospace', SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .section-header { background: #1e293b; color: white; padding: 10px 15px; font-weight: 800; border-radius: 4px; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .round-container { border: 2px solid #e2e8f0; border-radius: 8px; margin-top: 20px; overflow: hidden; background: white; }
        .round-header { background: #ef4444; color: white; padding: 8px 15px; font-weight: 900; text-align: center; }
        .step-item { padding: 10px 15px; border-bottom: 1px solid #f1f5f9; }
        .step-label { color: #b91c1c; font-weight: 700; display: block; margin-bottom: 2px; font-size: 0.75rem; }
        .final-result { background: #059669; color: white; padding: 20px; border-radius: 12px; margin-top: 30px; text-align: center; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .value-box { background: #f8fafc; padding: 4px 8px; border-radius: 4px; border: 1px solid #cbd5e1; word-break: break-all; font-size: 0.85rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 p-4 md:p-8 font-sans">
    <div class="max-w-4xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-200">
        <div class="bg-red-700 p-6 text-white">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-black italic drop-shadow-md uppercase">DES Solver Detail</h1>
                    <p class="text-[10px] opacity-80 uppercase tracking-widest mt-1">Trình giải 16 vòng lặp • Đã sửa lỗi vận hành</p>
                </div>
                <button onclick="location.reload()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-xs font-bold transition border border-white/20">LÀM MỚI</button>
            </div>
        </div>

        <div class="p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-100 p-5 rounded-xl border border-slate-200">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-1">Khóa K (16 ký tự Hex)</label>
                    <input id="keyK" class="w-full p-3 border-2 border-slate-300 rounded-lg hex-font focus:border-red-500 outline-none uppercase" placeholder="133457799BBCDFF1">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-1">Bản tin M (16 ký tự Hex)</label>
                    <input id="textM" class="w-full p-3 border-2 border-slate-300 rounded-lg hex-font focus:border-red-500 outline-none uppercase" placeholder="0123456789ABCDEF">
                </div>
                <button onclick="solveDES()" class="md:col-span-2 bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-lg transition-all active:scale-95 uppercase text-sm shadow-lg">
                    Bắt đầu tính toán chi tiết
                </button>
            </div>

            <div id="outputArea" class="hidden">
                <div id="solverContent" class="hex-font text-sm"></div>
                <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="w-full mt-6 py-3 border-2 border-dashed border-slate-300 text-slate-400 font-bold rounded-xl hover:bg-slate-50 transition-colors uppercase text-[10px]">
                    ↑ Lên đầu trang
                </button>
            </div>

            <div id="placeholder" class="text-center py-20 text-slate-400 italic flex flex-col items-center gap-4">
                <div class="w-16 h-1 bg-slate-200 rounded-full"></div>
                Nhập mã Hex (0-9, A-F) và bấm nút để xem lời giải...
            </div>
        </div>
    </div>

    <script>
        // --- CÁC BẢNG HOÁN VỊ CHUẨN DES ---
        const PC1 = [57,49,41,33,25,17,9,1,58,50,42,34,26,18,10,2,59,51,43,35,27,19,11,3,60,52,44,36,63,55,47,39,31,23,15,7,62,54,46,38,30,22,14,6,61,53,45,37,29,21,13,5,28,20,12,4];
        const PC2 = [14,17,11,24,1,5,3,28,15,6,21,10,23,19,12,4,26,8,16,7,27,20,13,2,41,52,31,37,47,55,30,40,51,45,33,48,44,49,39,56,34,53,46,42,50,36,29,32];
        const IP = [58,50,42,34,26,18,10,2,60,52,44,36,28,20,12,4,62,54,46,38,30,22,14,6,64,56,48,40,32,24,16,8,57,49,41,33,25,17,9,1,59,51,43,35,27,19,11,3,61,53,45,37,29,21,13,5,63,55,47,39,31,23,15,7];
        const E = [32,1,2,3,4,5,4,5,6,7,8,9,8,9,10,11,12,13,12,13,14,15,16,17,16,17,18,19,20,21,20,21,22,23,24,25,24,25,26,27,28,29,28,29,30,31,32,1];
        const P = [16,7,20,21,29,12,28,17,1,15,23,26,5,18,31,10,2,8,24,14,32,27,3,9,19,13,30,6,22,11,4,25];
        const IP_INV = [40,8,48,16,56,24,64,32,39,7,47,15,55,23,63,31,38,6,46,14,54,22,62,30,37,5,45,13,53,21,61,29,36,4,44,12,52,20,60,28,35,3,43,11,51,19,59,27,34,2,42,10,50,18,58,26,33,1,41,9,49,17,57,25];
        const SHIFTS = [1,1,2,2,2,2,2,2,1,2,2,2,2,2,2,1];
        const S_BOXES = [
            [[14,4,13,1,2,15,11,8,3,10,6,12,5,9,0,7],[0,15,7,4,14,2,13,1,10,6,12,11,9,5,3,8],[4,1,14,8,13,6,2,11,15,12,9,7,3,10,5,0],[15,12,8,2,4,9,1,7,5,11,3,14,10,0,6,13]],
            [[15,1,8,14,6,11,3,4,9,7,2,13,12,0,5,10],[3,13,4,7,15,2,8,14,12,0,1,10,6,9,11,5],[0,14,7,11,10,4,13,1,5,8,12,6,9,3,2,15],[13,8,10,1,3,15,4,2,11,6,7,12,0,5,14,9]],
            [[10,0,9,14,6,3,15,5,1,13,12,7,11,4,2,8],[13,7,0,9,3,4,6,10,2,8,5,14,12,11,15,1],[13,6,4,9,8,15,3,0,11,1,2,12,5,10,14,7],[1,10,13,0,6,9,8,7,4,15,14,3,11,5,2,12]],
            [[7,13,14,3,0,6,9,10,1,2,8,5,11,12,4,15],[13,8,11,5,6,15,0,3,4,7,2,12,1,10,14,9],[10,6,9,0,12,11,7,13,15,1,3,14,5,2,8,4],[3,15,0,6,10,1,13,8,9,4,5,11,12,7,2,14]],
            [[2,12,4,1,7,10,11,6,8,5,3,15,13,0,14,9],[14,11,2,12,4,7,13,1,5,0,15,10,3,9,8,6],[4,2,1,11,10,13,7,8,15,9,12,5,6,3,0,14],[11,8,12,7,1,14,2,13,6,15,0,9,10,4,5,3]],
            [[12,1,10,15,9,2,6,8,0,13,3,4,14,7,5,11],[10,15,4,2,7,12,9,5,6,1,13,14,0,11,3,8],[9,14,15,5,2,8,12,3,7,0,4,10,1,13,11,6],[4,3,2,12,9,5,15,10,11,14,1,7,6,0,8,13]],
            [[4,11,2,14,15,0,8,13,3,12,9,7,5,10,6,1],[13,0,11,7,4,9,1,10,14,3,5,12,2,15,8,6],[1,4,11,13,12,3,7,14,10,15,6,8,0,5,9,2],[6,11,13,8,1,4,10,7,9,5,0,15,14,2,3,12]],
            [[13,2,8,4,6,15,11,1,10,9,3,14,5,0,12,7],[1,15,13,8,10,3,7,4,12,5,6,11,0,14,9,2],[7,11,4,1,9,12,14,2,0,6,10,13,15,3,5,8],[2,1,14,7,4,10,8,13,15,12,9,0,3,5,6,11]]
        ];

        // --- HÀM TIỆN ÍCH ---
        const hexToBin = hex => hex.split('').map(c => parseInt(c, 16).toString(2).padStart(4, '0')).join('');
        const binToHex = bin => bin.match(/.{4}/g).map(b => parseInt(b, 2).toString(16).toUpperCase()).join('');
        const permute = (str, table) => table.map(i => str[i - 1]).join('');
        const xor = (a, b) => a.split('').map((c, i) => c === b[i] ? '0' : '1').join('');

        function solveDES() {
            const keyHex = document.getElementById('keyK').value.trim().toUpperCase();
            const msgHex = document.getElementById('textM').value.trim().toUpperCase();

            // Kiểm tra đầu vào
            const hexRegex = /^[0-9A-F]{16}$/;
            if (!hexRegex.test(keyHex) || !hexRegex.test(msgHex)) {
                alert("Lỗi: Vui lòng nhập đủ 16 ký tự Hex (0-9, A-F)!");
                return;
            }

            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('outputArea').classList.remove('hidden');
            const container = document.getElementById('solverContent');
            container.innerHTML = "";

            let keyBin = hexToBin(keyHex);
            let msgBin = hexToBin(msgHex);

            // 1. Sinh khóa
            container.innerHTML += `<div class="section-header">BƯỚC 1: SINH KHÓA CON (KEY SCHEDULE)</div>`;
            let kp1 = permute(keyBin, PC1);
            let C = kp1.slice(0, 28);
            let D = kp1.slice(28, 56);
            let subkeys = [];

            let keyTable = `<table class="w-full mt-2 border border-slate-200 text-[10px]">
                <tr class="bg-slate-800 text-white"><th class="p-1">Vòng</th><th class="p-1">Dịch</th><th class="p-1">Khóa con (Hex)</th></tr>`;

            for (let i = 0; i < 16; i++) {
                let s = SHIFTS[i];
                C = C.slice(s) + C.slice(0, s);
                D = D.slice(s) + D.slice(0, s);
                let Ki = permute(C + D, PC2);
                subkeys.push(Ki);
                keyTable += `<tr><td class="border p-1 text-center font-bold">${i+1}</td><td class="border p-1 text-center">${s}</td><td class="border p-1 text-blue-700 font-bold">${binToHex(Ki)}</td></tr>`;
            }
            container.innerHTML += keyTable + `</table>`;

            // 2. IP
            container.innerHTML += `<div class="section-header">BƯỚC 2: HOÁN VỊ KHỞI TẠO (IP)</div>`;
            let ipMsg = permute(msgBin, IP);
            let L = ipMsg.slice(0, 32);
            let R = ipMsg.slice(32, 64);
            container.innerHTML += `<div class="p-3 bg-slate-100 rounded mt-2">
                <b>IP Result:</b> ${binToHex(ipMsg)} <br>
                <b>L0:</b> <span class="text-red-600">${binToHex(L)}</span> | <b>R0:</b> <span class="text-red-600">${binToHex(R)}</span>
            </div>`;

            // 3. 16 Rounds
            container.innerHTML += `<div class="section-header">BƯỚC 3: 16 VÒNG LẶP FEISTEL</div>`;
            for (let i = 0; i < 16; i++) {
                let prevL = L;
                let prevR = R;
                
                let expandedR = permute(prevR, E);
                let xored = xor(expandedR, subkeys[i]);
                
                let sBoxOut = "";
                for (let j = 0; j < 8; j++) {
                    let block = xored.slice(j * 6, (j + 1) * 6);
                    let row = parseInt(block[0] + block[5], 2);
                    let col = parseInt(block.slice(1, 5), 2);
                    sBoxOut += S_BOXES[j][row][col].toString(2).padStart(4, '0');
                }
                
                let fOut = permute(sBoxOut, P);
                R = xor(prevL, fOut);
                L = prevR;

                container.innerHTML += `
                <div class="round-container">
                    <div class="round-header">ROUND ${i + 1}</div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-px bg-slate-200">
                        <div class="step-item bg-white"><span class="step-label">Khóa K${i+1}</span><div class="value-box">${binToHex(subkeys[i])}</div></div>
                        <div class="step-item bg-white"><span class="step-label">f(R${i}, K${i+1})</span><div class="value-box">${binToHex(fOut)}</div></div>
                        <div class="step-item bg-red-50"><span class="step-label">L${i+1} (R${i})</span><div class="font-bold">${binToHex(L)}</div></div>
                        <div class="step-item bg-red-50"><span class="step-label">R${i+1} (L${i} ⊕ f)</span><div class="font-bold">${binToHex(R)}</div></div>
                    </div>
                </div>`;
            }

            // 4. IP-1
            container.innerHTML += `<div class="section-header">BƯỚC 4: HOÁN VỊ NGHỊCH ĐẢO (IP⁻¹)</div>`;
            let combined = R + L; // Lưu ý: DES tráo đổi R16 và L16 trước khi qua IP-1
            let finalBin = permute(combined, IP_INV);
            let finalHex = binToHex(finalBin);

            container.innerHTML += `
            <div class="final-result">
                <p class="text-xs opacity-80 uppercase mb-1">Ciphertext (Mã hóa xong)</p>
                <div class="text-4xl font-black tracking-widest">${finalHex}</div>
            </div>`;
        }
    </script>
</body>
</html>
