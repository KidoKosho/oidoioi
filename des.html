<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>DES Step-by-Step Solver - Kido</title>
    <style>
        .hex-font { font-family: 'ui-monospace', SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .section-header { background: #1e293b; color: white; padding: 10px 15px; font-weight: 800; border-radius: 4px; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .round-container { border: 2px solid #e2e8f0; border-radius: 8px; margin-top: 20px; overflow: hidden; }
        .round-header { background: #ef4444; color: white; padding: 8px 15px; font-weight: 900; text-align: center; }
        .step-item { padding: 10px 15px; border-bottom: 1px solid #f1f5f9; }
        .step-label { color: #b91c1c; font-weight: 700; display: block; margin-bottom: 2px; font-size: 0.8rem; }
        .final-result { background: #059669; color: white; padding: 20px; border-radius: 12px; margin-top: 30px; text-align: center; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 p-4 md:p-8 font-sans">
    <div class="max-w-4xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-200">
        <div class="bg-red-700 p-6 text-white relative">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-2xl font-black italic drop-shadow-md">DES STEP-BY-STEP SOLVER</h1>
                    <p class="text-[10px] opacity-80 uppercase tracking-widest mt-1">Trình giải chi tiết 16 vòng lặp • Kido Edition</p>
                </div>
                <a href="index.html" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-xs font-bold transition flex items-center gap-2 border border-white/20">
                    <span>←</span> QUAY LẠI
                </a>
            </div>
        </div>

        <div class="p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-100 p-5 rounded-xl border border-slate-200">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-1">Khóa K (64-bit Hex)</label>
                    <input id="keyK" class="w-full p-3 border-2 border-slate-300 rounded-lg hex-font focus:border-red-500 outline-none transition-all" placeholder="VD: 3FF81CDA5F417784">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-1">Bản tin M (64-bit Hex)</label>
                    <input id="textM" class="w-full p-3 border-2 border-slate-300 rounded-lg hex-font focus:border-red-500 outline-none transition-all" placeholder="VD: FF1C9CA3596B7D48">
                </div>
                <button onclick="solveDES()" class="md:col-span-2 bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-lg transition-all active:scale-95 uppercase text-sm shadow-lg shadow-red-900/20">
                    Bắt đầu xuất lời giải chi tiết
                </button>
            </div>

            <div id="outputArea" class="hidden">
                <div id="solverContent" class="hex-font text-sm leading-relaxed text-slate-700"></div>
                <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="w-full mt-6 py-3 border-2 border-dashed border-slate-300 text-slate-400 font-bold rounded-xl hover:bg-slate-50 transition-colors uppercase text-[10px]">
                    ↑ Cuộn lên đầu trang
                </button>
            </div>

            <div id="placeholder" class="text-center py-20 text-slate-400 italic flex flex-col items-center gap-4">
                <div class="w-16 h-1 bg-slate-200 rounded-full"></div>
                Vui lòng nhập K và M để hệ thống xuất lời giải...
            </div>
        </div>
    </div>

    <script>
        // ... (Sao chép toàn bộ phần <script> từ code cũ của bạn vào đây) ...
        // Lưu ý: Đảm bảo copy đủ các bảng PC1, PC2, S_BOXES... và hàm solveDES()
    </script>
</body>
</html>
