<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>DES Step-by-Step Generator</title>
</head>
<body class="bg-slate-50 p-6 font-serif">
    <div class="max-w-4xl mx-auto bg-white p-8 shadow-lg border border-slate-200">
        <h1 class="text-2xl font-bold text-center text-red-700 uppercase mb-6">Báo cáo chi tiết mã hóa DES</h1>
        
        <div class="bg-slate-100 p-4 rounded-lg mb-6 grid grid-cols-2 gap-4">
            <div>
                <label class="block font-bold">Khóa K (64-bit Hex):</label>
                <input id="keyK" class="w-full p-2 border font-mono uppercase" placeholder="Ví dụ: 3FF81CDA5F417784">
            </div>
            <div>
                <label class="block font-bold">Bản tin M (64-bit Hex):</label>
                <input id="textM" class="w-full p-2 border font-mono uppercase" placeholder="Ví dụ: FF1C9CA3596B7D48">
            </div>
            <button onclick="generateDES()" class="col-span-2 bg-red-600 text-white font-bold py-3 rounded hover:bg-red-700 transition">GIẢI CHI TIẾT BÀI TẬP</button>
        </div>

        <div id="report" class="whitespace-pre-wrap font-mono text-sm text-slate-800 leading-relaxed">
            </div>
    </div>

    <script>
        // Các bảng hoán vị DES (PC1, PC2, IP, E, S-Box, P, IP-1)
        const PC1 = [57,49,41,33,25,17,9,1,58,50,42,34,26,18,10,2,59,51,43,35,27,19,11,3,60,52,44,36,63,55,47,39,31,23,15,7,62,54,46,38,30,22,14,6,61,53,45,37,29,21,13,5,28,20,12,4];
        const PC2 = [14,17,11,24,1,5,3,28,15,6,21,10,23,19,12,4,26,8,16,7,27,20,13,2,41,52,31,37,47,55,30,40,51,45,33,48,44,49,39,56,34,53,46,42,50,36,29,32];
        const IP = [58,50,42,34,26,18,10,2,60,52,44,36,28,20,12,4,62,54,46,38,30,22,14,6,64,56,48,40,32,24,16,8,57,49,41,33,25,17,9,1,59,51,43,35,27,19,11,3,61,53,45,37,29,21,13,5,63,55,47,39,31,23,15,7];
        const E = [32,1,2,3,4,5,4,5,6,7,8,9,8,9,10,11,12,13,12,13,14,15,16,17,16,17,18,19,20,21,20,21,22,23,24,25,24,25,26,27,28,29,28,29,30,31,32,1];
        const P = [16,7,20,21,29,12,28,17,1,15,23,26,5,18,31,10,2,8,24,14,32,27,3,9,19,13,30,6,22,11,4,25];
        const IP_INV = [40,8,48,16,56,24,64,32,39,7,47,15,55,23,63,31,38,6,46,14,54,22,62,30,37,5,45,13,53,21,61,29,36,4,44,12,52,20,60,28,35,3,43,11,51,19,59,27,34,2,42,10,50,18,58,26,33,1,41,9,49,17,57,25];
        const SHIFTS = [1,1,2,2,2,2,2,2,1,2,2,2,2,2,2,1];
        const S_BOXES = [
            [[14,4,13,1,2,15,11,8,3,10,6,12,5,9,0,7],[0,15,7,4,14,2,13,1,10,6,12,11,9,5,3,8],[4,1,14,8,13,6,2,11,15,12,9,7,3,10,5,0],[15,12,8,2,4,9,1,7,5,11,3,14,10,0,6,13]],
            [[15,1,8,14,6,11,3,4,9,7,2,13,12,0,5,10],[3,13,4,7,15,2,8,14,12,0,1,10,6,9,11,5],[0,14,7,11,10,4,13,1,5,8,12,6,9,3,2,15],[13,8,10,1,3,15,4,2,11,6,7,12,0,5,14,9]],
            [[10,0,9,14,6,3,15,5,1,13,12,7,11,4,2,8],[13,7,0,9,3,4,6,10,2,8,5,14,12,11,15,1],[13,6,4,9,8,15,3,0,11,1,2,12,5,10,14,7],[1,10,13,0,6,9,8,7,4,15,14,3,11,5,2,12]],
            [[7,13,14,3,0,6,9,10,1,2,8,5,11,12,4,15],[13,8,11,5,6,15,0,3,4,7,2,12,1,10,14,9],[10,6,9,0,12,11,7,13,15,1,3,14,5,2,8,4],[3,15,0,6,10,1,13,8,9,4,5,11,12,7,2,14]],
            [[2,12,4,1,7,10,11,6,8,5,3,15,13,0,14,9],[14,11,2,12,4,7,13,1,5,0,15,10,3,9,8,6],[4,2,1,11,10,13,7,8,15,9,12,5,6,3,0,14],[11,8,12,7,1,14,2,13,6,15,0,9,10,4,5,3]],
            [[12,1,10,15,9,2,6,8,0,13,3,4,14,7,5,11],[10,15,4,2,7,12,9,5,6,1,13,14,0,11,3,8],[9,14,15,5,2,8,12,3,7,0,4,10,1,13,11,6],[4,3,2,12,9,5,15,10,11,14,1,7,6,0,8,13]],
            [[4,11,2,14,15,0,8,13,3,12,9,7,5,10,6,1],[13,0,11,7,4,9,1,10,14,3,5,12,2,15,8,6],[1,4,11,13,12,3,7,14,10,15,6,8,0,5,9,2],[6,11,13,8,1,4,10,7,9,5,0,15,14,2,3,12]],
            [[13,2,8,4,6,15,11,1,10,9,3,14,5,0,12,7],[1,15,13,8,10,3,7,4,12,5,6,11,0,14,9,2],[7,11,4,1,9,12,14,2,0,6,10,13,15,3,5,8],[2,1,14,7,4,10,8,13,15,12,9,0,3,5,6,11]]
        ];

        function hex2bin(hex) {
            return hex.split('').map(c => parseInt(c, 16).toString(2).padStart(4, '0')).join('');
        }

        function bin2hex(bin) {
            let hex = "";
            for(let i=0; i<bin.length; i+=4) hex += parseInt(bin.substr(i,4), 2).toString(16).toUpperCase();
            return hex;
        }

        function permute(input, table) {
            return table.map(pos => input[pos-1]).join('');
        }

        function xor(a, b) {
            let res = "";
            for(let i=0; i<a.length; i++) res += (a[i] === b[i] ? '0' : '1');
            return res;
        }

        function generateDES() {
            const K_hex = document.getElementById('keyK').value.trim().toUpperCase();
            const M_hex = document.getElementById('textM').value.trim().toUpperCase();
            if(K_hex.length !== 16 || M_hex.length !== 16) { alert("Vui lòng nhập đủ 16 ký tự Hex!"); return; }

            const K_bin = hex2bin(K_hex);
            const M_bin = hex2bin(M_hex);

            let out = `PHẦN 1: SINH KHÓA Ki từ khóa K\n`;
            // Bài 1
            let pc1 = permute(K_bin, PC1);
            let C0 = pc1.substr(0, 28);
            let D0 = pc1.substr(28, 28);
            out += `1. Tính hoán vị PC1:\n   Input: K = ${K_hex}\n   Output: C0 = ${bin2hex(C0)}, D0 = ${bin2hex(D0)}\n\n`;

            // Bài 2 & 3 (Vòng 1)
            let shift = SHIFTS[0];
            let C1 = C0.substr(shift) + C0.substr(0, shift);
            let D1 = D0.substr(shift) + D0.substr(0, shift);
            out += `2. Tính dịch vòng C1, D1 (s1=${shift}):\n   Output: C1 = ${bin2hex(C1)}, D1 = ${bin2hex(D1)}\n`;

            let K1_bin = permute(C1 + D1, PC2);
            out += `3. Tính khóa K1 (PC2):\n   Output: K1 = ${bin2hex(K1_bin)}\n\n`;

            out += `PHẦN 2: MÃ HÓA\n`;
            // Bài 4
            let ip = permute(M_bin, IP);
            let L0 = ip.substr(0, 32);
            let R0 = ip.substr(32, 32);
            out += `4. Tính hoán vị IP đối với M:\n   Input: M = ${M_hex}\n   Output: L0 = ${bin2hex(L0)}, R0 = ${bin2hex(R0)}\n\n`;

            out += `========== CHI TIẾT VÒNG LẶP THỨ NHẤT ==========\n`;
            // Bài 5
            let ER0 = permute(R0, E);
            out += `5. Hàm mở rộng E[R0]:\n   Output: ER0 = ${bin2hex(ER0)}\n`;

            // Bài 6
            let A = xor(ER0, K1_bin);
            out += `6. XOR ER0 với K1:\n   Output: A = ${bin2hex(A)}\n`;

            // Bài 7
            let B = "";
            for(let i=0; i<8; i++) {
                let chunk = A.substr(i*6, 6);
                let row = parseInt(chunk[0] + chunk[5], 2);
                let col = parseInt(chunk.substr(1, 4), 2);
                B += S_BOXES[i][row][col].toString(2).padStart(4, '0');
            }
            out += `7. Phép thế S-box:\n   Output: B = ${bin2hex(B)}\n`;

            // Bài 8
            let F = permute(B, P);
            out += `8. Hoán vị P đối với B:\n   Output: F = ${bin2hex(F)}\n\n`;

            // Bài 9
            let L1 = R0;
            let R1 = xor(L0, F);
            out += `========= THỰC HIỆN VÒNG LẶP THỨ NHẤT =========\n`;
            out += `9. Kết quả Vòng 1:\n   Output: L1 = ${bin2hex(L1)}; R1 = ${bin2hex(R1)}\n\n`;

            // Vòng 2-16 (Chạy ngầm để lấy L16, R16)
            let currL = L1, currR = R1, currC = C1, currD = D1;
            for(let i=1; i<16; i++) {
                let s = SHIFTS[i];
                currC = currC.substr(s) + currC.substr(0, s);
                currD = currD.substr(s) + currD.substr(0, s);
                let Ki = permute(currC + currD, PC2);
                
                let nextL = currR;
                let er = permute(currR, E);
                let a = xor(er, Ki);
                let b = "";
                for(let j=0; j<8; j++) {
                    let chunk = a.substr(j*6, 6);
                    let r = parseInt(chunk[0] + chunk[5], 2);
                    let c = parseInt(chunk.substr(1, 4), 2);
                    b += S_BOXES[j][r][c].toString(2).padStart(4, '0');
                }
                let f = permute(b, P);
                currR = xor(currL, f);
                currL = nextL;
            }

            // Bài 11
            let preOutput = currR + currL; // Ghép R16L16
            let FinalC = permute(preOutput, IP_INV);
            out += `========= KẾT THÚC VÒNG LẶP THỨ 16 =========\n`;
            out += `11. Hoán vị cuối cùng IP-1:\n`;
            out += `    Input: L16 = ${bin2hex(currL)}, R16 = ${bin2hex(currR)}\n`;
            out += `    Output: C = ${bin2hex(FinalC)}\n`;
            out += `\n============ KẾT QUẢ MÃ HÓA ============`;

            document.getElementById('report').innerText = out;
        }
    </script>
</body>
</html>
